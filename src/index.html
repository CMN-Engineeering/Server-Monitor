<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Monitor - Hệ thống Quản lý Máy</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <h1>Server Monitor - Hệ thống Quản lý Máy</h1>
        
        <div class="management-bar">
            <!-- Factory Selection -->
            <div class="selector-group">
                <label>Nhà máy:</label>
                <select id="factory-select" onchange="loadStorages()">
                    <option value="">-- Chọn nhà máy --</option>
                </select>
                <button class="mgmt-btn" onclick="addFactory()">+ Thêm</button>
                <button class="mgmt-btn delete" onclick="deleteFactory()">- Xóa</button>
            </div>
            
            <!-- Storage Selection -->
            <div class="selector-group">
                <label>Kho:</label>
                <select id="storage-select" onchange="loadMachines()">
                    <option value="">-- Chọn kho --</option>
                </select>
                <button class="mgmt-btn" onclick="addStorage()">+ Thêm</button>
                <button class="mgmt-btn delete" onclick="deleteStorage()">- Xóa</button>
            </div>

            <!-- Machine Selection -->
            <div class="selector-group">
                <label>Máy:</label>
                <select id="machine-select" onchange="loadConveyors()">
                    <option value="">-- Chọn máy --</option>
                </select>
                <button class="mgmt-btn" onclick="addMachine()">+ Thêm</button>
                <button class="mgmt-btn delete" onclick="deleteMachine()">- Xóa</button>
            </div>

            <!-- Conveyor Selection -->
            <div class="selector-group">
                <label>Băng tải:</label>
                <select id="conveyor-select" onchange="loadConveyorDetails()">
                    <option value="">-- Chọn băng tải --</option>
                </select>
                <button class="mgmt-btn" onclick="addConveyor()">+ Thêm</button>
                <button class="mgmt-btn delete" onclick="deleteConveyor()">- Xóa</button>
            </div>

            <!-- View Confirmation Buttons -->
            <div class="selector-group" style="margin-left: auto;">
                <button class="mgmt-btn view-btn" onclick="viewStorageDashboard()" title="Xem dashboard kho">📊 Kho</button>
                <button class="mgmt-btn view-btn" onclick="viewMachineDashboard()" title="Xem dashboard máy">📊 Máy</button>
                <button class="mgmt-btn view-btn" onclick="viewConveyorDashboard()" title="Xem dashboard băng tải">📊 Băng tải</button>
            </div>
        </div>
    </div>

    <!-- Display Details -->
    <div class="content">
        <div class="details-panel" id="details-panel">
            <h2 id="details-title">Chọn một bánh xe tải để xem chi tiết</h2>
            <div id="details-content"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
