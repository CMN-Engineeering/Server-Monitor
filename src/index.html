<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Monitor - Hệ thống Quản lý Máy</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="login-screen" class="login-container">
        <div class="login-box">
            <h2>Hệ thống Quản lý Máy</h2>
            <p>Vui lòng đăng nhập</p>
            <input type="text" id="username" placeholder="Tài khoản (admin hoặc operator)">
            <input type="password" id="password" placeholder="Mật khẩu (admin hoặc operator)">
            <button class="mgmt-btn" style="width: 100%; margin-top: 10px;" onclick="login()">Đăng nhập</button>
            <div id="login-error" style="color: red; margin-top: 10px; display: none;">Sai tài khoản hoặc mật khẩu!</div>
        </div>
    </div>

    <div id="app-content" style="display: none;">
        <div class="header" style="display: flex; justify-content: space-between; align-items: center;">
            <h1 style="margin: 0;">Server Monitor - Hệ thống Quản lý Máy</h1>
            <div class="user-info">
                <span id="user-display" style="margin-right: 15px; font-weight: bold;"></span>
                <button class="mgmt-btn delete" onclick="logout()">Đăng xuất</button>
            </div>
        </div>
        
        <div class="management-bar">
    <div class="selector-group">
        <label>Nhà máy:</label>
        <select id="factory-select" onchange="loadStorages()">
            <option value="">-- Chọn nhà máy --</option>
        </select>
        <button class="mgmt-btn admin-only" onclick="addFactory()">+ Thêm</button>
        <button class="mgmt-btn delete admin-only" onclick="deleteFactory()">- Xóa</button>
    </div>
    
    <div class="selector-group">
        <label>Kho:</label>
        <select id="storage-select" onchange="loadMachines()">
            <option value="">-- Chọn kho --</option>
        </select>
        <button class="mgmt-btn admin-only" onclick="addStorage()">+ Thêm</button>
        <button class="mgmt-btn delete admin-only" onclick="deleteStorage()">- Xóa</button>
    </div>

    <div class="selector-group">
        <label>Máy:</label>
        <select id="machine-select" onchange="handleMachineSelection()">
            <option value="">-- Chọn máy --</option>
        </select>
        <button class="mgmt-btn admin-only" onclick="addMachine()">+ Thêm</button>
        <button class="mgmt-btn delete admin-only" onclick="deleteMachine()">- Xóa</button>
    </div>
    
    </div>

        <div class="content">
            <div class="details-panel" id="details-panel">
                <h2 id="details-title">Chọn Nhà máy và Kho để xem Dashboard</h2>
                <div id="details-content"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
